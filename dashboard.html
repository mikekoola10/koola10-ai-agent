<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Admin</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 20px; line-height: 1.4; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .card { border: 1px solid #333; padding: 15px; background: #111; }
        .status { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
        .online { background: #0f0; box-shadow: 0 0 5px #0f0; }
        .offline { background: #f00; }
        h1, h2 { color: #fff; margin-top: 0; }
        button { background: #333; color: #fff; border: 1px solid #555; padding: 8px 12px; cursor: pointer; font-family: monospace; }
        button:hover { background: #444; }
        button:disabled { opacity: 0.5; }
        .red { color: #f00; border-color: #f00; }
        .red:hover { background: #300; }
        pre { font-size: 12px; overflow-x: auto; color: #aaa; }
        .node { border-bottom: 1px solid #222; padding: 5px 0; }
    </style>
</head>
<body>
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1>AGENT_ADMIN_PANEL v1.0</h1>
        <div>
            <span id="status-dot" class="status online"></span>
            <span id="status-text">SYSTEM_NOMINAL</span>
        </div>
    </header>

    <div class="grid">
        <div class="card">
            <h2>FINANCIAL_LEDGER</h2>
            <div>BALANCE: <span id="balance">$0.00</span></div>
            <div>COSTS:   <span id="costs">$0.00</span></div>
            <div>REVENUE: <span id="revenue">$0.00</span></div>
            <div style="margin-top:10px;">ROI_RATIO: <span id="roi">0.00</span>x</div>
        </div>

        <div class="card">
            <h2>SWARM_NETWORK</h2>
            <div id="nodes-list">Scanning for nodes...</div>
        </div>

        <div class="card">
            <h2>CONTROL_CENTER</h2>
            <div style="margin-bottom: 10px;">
                PENDING_APPROVALS: <span id="approvals-count">0</span>
            </div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <button onclick="triggerMonitor()">RUN_DAILY_MONITOR</button>
                <button id="kill-btn" class="red" onclick="toggleKillSwitch()">ACTIVATE_KILL_SWITCH</button>
            </div>
        </div>
    </div>

    <div class="grid" style="margin-top: 15px;">
        <div class="card">
            <h2>SYSTEM_LOGS</h2>
            <pre id="logs" style="height: 200px; overflow-y: auto;">Initializing telemetry...</pre>
        </div>
        <div class="card">
            <h2>LIVE_EVENTS</h2>
            <div id="events" style="height: 200px; overflow-y: auto; font-size: 12px; color: #0af;">
                Waiting for events...
            </div>
        </div>
    </div>

    <script>
        // SSE Listener
        const eventSource = new EventSource('/events/stream');
        const eventsDiv = document.getElementById('events');

        eventSource.onmessage = function(e) {
            const data = JSON.parse(e.data);
            const el = document.createElement('div');
            el.style.borderBottom = '1px solid #222';
            el.style.padding = '2px 0';

            let color = '#0af';
            if (data.type === 'error') color = '#f00';
            if (data.type === 'compliance_check') color = '#f0f';
            if (data.type === 'agent_activity') color = '#ff0';
            if (data.type === 'tool_called') color = '#0f0';

            el.style.color = color;
            el.innerHTML = `[${new Date().toLocaleTimeString()}] <b>${data.type.toUpperCase()}</b>: ${JSON.stringify(data.data)}`;

            eventsDiv.prepend(el);
            if (eventsDiv.childNodes.length > 50) {
                eventsDiv.removeChild(eventsDiv.lastChild);
            }
        };

        eventSource.onerror = function(e) {
            console.error("SSE Error:", e);
        };

        async function update() {
            try {
                // Ledger
                const ledger = await fetch('/economic/ledger/summary').then(r => r.json());
                document.getElementById('balance').innerText = `$${ledger.balance.toFixed(2)}`;
                document.getElementById('costs').innerText = `$${ledger.total_costs.toFixed(2)}`;
                document.getElementById('revenue').innerText = `$${ledger.total_revenue.toFixed(2)}`;
                document.getElementById('roi').innerText = ledger.roi.toFixed(2);

                // Nodes
                const nodes = await fetch('/swarm/nodes').then(r => r.json());
                const nodesDiv = document.getElementById('nodes-list');
                if (nodes.length === 0) {
                    nodesDiv.innerText = "No active nodes.";
                } else {
                    nodesDiv.innerHTML = nodes.map(n => `
                        <div class="node">
                            [${n.region}] ${n.node_id} - ${n.status}
                        </div>
                    `).join('');
                }

                // Approvals
                const audit = await fetch('/compliance/audit').then(r => r.json());
                const pending = audit.filter(e => e.action === 'approval_request_created');
                document.getElementById('approvals-count').innerText = pending.length;

                // Log a tick
                const logs = document.getElementById('logs');
                const timestamp = new Date().toISOString().split('T')[1].split('.')[0];
                logs.innerText = `[${timestamp}] Telemetry update successful\n` + logs.innerText.split('\n').slice(0, 10).join('\n');

            } catch (e) {
                console.error(e);
                document.getElementById('status-dot').className = 'status offline';
                document.getElementById('status-text').innerText = 'CONNECTION_LOST';
            }
        }

        async function triggerMonitor() {
            const btn = event.target;
            btn.disabled = true;
            btn.innerText = 'EXECUTING...';
            await fetch('/grants/monitor');
            btn.innerText = 'MONITOR_COMPLETE';
            setTimeout(() => { btn.disabled = false; btn.innerText = 'RUN_DAILY_MONITOR'; }, 2000);
        }

        async function toggleKillSwitch() {
            const btn = document.getElementById('kill-btn');
            if (btn.innerText.includes('ACTIVATE')) {
                await fetch('/compliance/kill-switch', {method: 'POST'});
                btn.innerText = 'RESET_KILL_SWITCH';
                btn.className = '';
            } else {
                await fetch('/compliance/kill-switch/reset', {method: 'POST'});
                btn.innerText = 'ACTIVATE_KILL_SWITCH';
                btn.className = 'red';
            }
        }

        setInterval(update, 5000);
        update();
    </script>
</body>
</html>
