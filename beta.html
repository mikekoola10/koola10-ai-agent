<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>APEX Protocol — Private Beta</title>
    <style>
        body { background: #000; color: #00ff88; font-family: monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .container { border: 1px solid #00ff88; padding: 40px; background: rgba(0, 20, 0, 0.9); box-shadow: 0 0 20px #00ff88; max-width: 400px; width: 100%; text-align: center; }
        input { background: #000; border: 1px solid #00ff88; color: #00ff88; padding: 10px; width: 100%; margin: 20px 0; box-sizing: border-box; }
        button { background: #00ff88; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #00cc66; }
        h1 { font-size: 24px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>APEX_PRIVATE_BETA</h1>
        <p>Apply for cognitive extension integration.</p>
        <form id="betaForm">
            <input type="email" id="email" placeholder="USER_EMAIL_ADDRESS" required>
            <button type="submit">REQUEST_ACCESS</button>
        </form>
        <p id="msg" style="margin-top:20px; display:none;"></p>
    </div>
    <script>
        document.getElementById('betaForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const res = await fetch('/api/beta/signup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email})
            });
            const data = await res.json();
            document.getElementById('betaForm').style.display = 'none';
            document.getElementById('msg').style.display = 'block';
            document.getElementById('msg').innerText = data.message || 'APPLICATION_RECEIVED. PENDING_MIRROR_PROVISIONING.';
        };
    </script>
</body>
</html>
