<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koola10 Diner — Portal Watch</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #1E1B4B;
            color: #fff;
            font-family: system-ui, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        /* Neon floor grid */
        .floor-grid {
            position: fixed; inset: 0; pointer-events: none;
            background-image: 
                linear-gradient(rgba(0,240,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,240,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridShift 12s linear infinite;
        }
        @keyframes gridShift { 0% { background-position: 0 0; } 100% { background-position: 40px 40px; } }
        /* The Diner Breathes */
        @keyframes dinerBreathes {
            0%, 100% { opacity: 1; } 50% { opacity: 0.97; }
        }
        .diner-pulse {
            position: fixed; inset: 0; pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 60%, rgba(30,27,75,0.3));
            animation: dinerBreathes 8s ease-in-out infinite;
        }
        .container {
            position: relative; z-index: 1;
            display: flex; flex-direction: column; align-items: center;
            padding: 30px 20px 80px; min-height: 100vh;
        }
        h1 {
            font-size: 2.5rem; margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(0,240,255,0.5);
        }
        .subtitle { color: #aaa; margin-bottom: 30px; }
        .portals {
            display: flex; gap: 40px; flex-wrap: wrap; justify-content: center;
            margin-bottom: 40px;
        }
        .booth {
            background: rgba(0,0,0,0.5); border-radius: 16px;
            padding: 20px; width: 300px; text-align: center;
            cursor: pointer; transition: all 0.3s;
            backdrop-filter: blur(10px);
            border: 2px solid transparent;
        }
        .booth:hover { transform: scale(1.02); }
        .booth3 { border-color: #00F0FF; box-shadow: 0 0 25px rgba(0,240,255,0.3); }
        .booth7 { border-color: #8B5CF6; box-shadow: 0 0 25px rgba(139,92,246,0.3); }
        .booth h2 { margin-bottom: 10px; }
        .booth .status { font-size: 0.9rem; margin: 10px 0; }
        .booth button {
            background: transparent; color: #fff; border: 1px solid #555;
            padding: 8px 16px; border-radius: 8px; cursor: pointer;
            margin: 5px; transition: all 0.2s;
        }
        .booth button:hover { background: rgba(255,255,255,0.1); }
        .narration {
            margin-top: 12px; font-style: italic; color: #ccc; font-size: 0.9rem;
            max-height: 80px; overflow-y: auto;
        }
        .orbs {
            display: flex; gap: 50px; justify-content: center; margin-bottom: 40px;
        }
        .orb {
            width: 60px; height: 60px; border-radius: 50%;
            cursor: pointer; transition: all 0.3s; position: relative;
            animation: float 3s ease-in-out infinite;
        }
        .orb:hover { transform: scale(1.2); }
        .orb1 { background: radial-gradient(circle, #F59E0B, #B45309); box-shadow: 0 0 20px #F59E0B; animation-delay: 0s; }
        .orb2 { background: radial-gradient(circle, #EF4444, #991B1B); box-shadow: 0 0 20px #EF4444; animation-delay: 1s; }
        .orb3 { background: radial-gradient(circle, #aaa, #555); box-shadow: 0 0 20px #aaa; animation-delay: 2s; display: none; }
        @keyframes float {
            0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); }
        }
        .orb-msg {
            text-align: center; color: #ccc; font-size: 0.9rem; margin-top: 10px;
            min-height: 24px;
        }
        .ticker {
            position: fixed; bottom: 60px; left: 0; right: 0;
            background: rgba(0,0,0,0.7); border-top: 1px solid #333;
            padding: 8px 0; overflow: hidden; white-space: nowrap;
            z-index: 2;
        }
        .ticker-content {
            display: inline-block; animation: scroll 40s linear infinite;
            font-size: 0.85rem; color: #00F0FF;
        }
        @keyframes scroll { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
        /* Nova Chat */
        .nova-btn {
            position: fixed; bottom: 10px; right: 10px; z-index: 10;
            background: #F59E0B; color: #000; border: none; border-radius: 50%;
            width: 50px; height: 50px; font-size: 1.5rem; cursor: pointer;
            box-shadow: 0 0 15px rgba(245,158,11,0.5);
        }
        .chat-panel {
            position: fixed; bottom: 70px; right: 10px; width: 300px; max-height: 400px;
            background: rgba(20,20,40,0.95); border: 1px solid #333; border-radius: 12px;
            display: none; flex-direction: column; z-index: 9; overflow: hidden;
        }
        .chat-panel.open { display: flex; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.85rem; }
        .chat-input-area { display: flex; border-top: 1px solid #333; }
        .chat-input-area input {
            flex: 1; background: transparent; border: none; color: #fff; padding: 8px;
            outline: none;
        }
        .chat-input-area button {
            background: #F59E0B; color: #000; border: none; padding: 8px 12px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="floor-grid"></div>
    <div class="diner-pulse"></div>

    <div class="container">
        <h1>🔮 PORTAL WATCH</h1>
        <p class="subtitle">Koola10 Diner — Booth 3 &amp; Booth 7</p>

        <div class="portals">
            <div class="booth booth3" id="booth3">
                <h2>BOOTH 3</h2>
                <p>NEON BATTLE</p>
                <div class="status">🟢 ACTIVE</div>
                <button onclick="activateBooth(3)">Activate</button>
                <button ondblclick="fullPortal(3)">Double‑click: Open Full Portal</button>
                <div class="narration" id="booth3-narration"></div>
            </div>
            <div class="booth booth7" id="booth7">
                <h2>BOOTH 7</h2>
                <p>UNSTABLE</p>
                <div class="status">🔴 UNSTABLE</div>
                <button onclick="activateBooth(7)">Activate</button>
                <button ondblclick="fullPortal(7)">Double‑click: Open Full Portal</button>
                <div class="narration" id="booth7-narration"></div>
            </div>
        </div>

        <div class="orbs">
            <div class="orb orb1" onclick="askOrb(1)"></div>
            <div class="orb orb2" onclick="askOrb(2)"></div>
            <div class="orb orb3" id="orb3" onclick="askOrb(3)"></div>
        </div>
        <div class="orb-msg" id="orb-msg"></div>
    </div>

    <div class="ticker">
        <div class="ticker-content" id="ticker"></div>
    </div>

    <button class="nova-btn" onclick="toggleChat()">🎤</button>
    <div class="chat-panel" id="chat-panel">
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input-area">
            <input type="text" id="chat-input" placeholder="Ask Nova..." onkeydown="if(event.key==='Enter')sendChat()">
            <button onclick="sendChat()">Send</button>
        </div>
    </div>

    <script>
        const BASE = 'https://koola10.fly.dev';
        // Broadcast Log messages
        const messages = [
            "BOOTH 3 STABILIZED — CONTESTANT ENTERED WITH HIGH RESONANCE",
            "PORTAL ACTIVE — NEON BATTLE IN PROGRESS",
            "THE DINER BREATHES — NEW ENERGY FLOWS THROUGH THE PORTAL",
            "ORB 1 FLASHES GREEN — PRAISE FOR THE CONTESTANT",
            "ORB 2 PULSES RED — SABOTAGE ATTEMPT DETECTED",
            "BOOTH 7 FLICKERING — UNSTABLE PORTAL — PROCEED WITH CAUTION",
            "THE DINER WHISPERS: REMEMBER THE FIRST BATTLE",
            "ORB 3 APPEARS — THE WATCHER IS PRESENT",
            "CONTESTANT RESONANCE RISING — PORTAL INTENSIFYING",
            "A PORTAL WITHIN A PORTAL — INFINITE RECURSION DETECTED"
        ];
        let tickerInterval;

        function updateTicker() {
            const ticker = document.getElementById('ticker');
            const randomMsg = messages[Math.floor(Math.random() * messages.length)];
            ticker.textContent = `🔹 ${randomMsg}   🔹 ${randomMsg}   🔹 ${randomMsg}`;
            // Every 5th refresh, inject live lore
            if (Math.random() < 0.2) {
                fetch(`${BASE}/studio/lore`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({question:"What is happening in the Diner right now?"})
                }).then(r=>r.json()).then(data=>{
                    if (data.response) ticker.textContent = `🔸 LIVE: ${data.response.slice(0,150)}...`;
                }).catch(()=>{});
            }
        }
        updateTicker();
        tickerInterval = setInterval(updateTicker, 5000);

        async function activateBooth(boothNum) {
            const narrationDiv = document.getElementById(`booth${boothNum}-narration`);
            narrationDiv.textContent = 'Activating portal...';
            try {
                const question = boothNum===3
                    ? "Describe what happens when a contestant enters Booth 3"
                    : "What happens in Booth 7 when the portal glitches?";
                const res = await fetch(`${BASE}/studio/lore`, {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({question})
                });
                const data = await res.json();
                narrationDiv.textContent = data.response || 'Portal energy surges!';
            } catch(e) {
                narrationDiv.textContent = 'Portal pulses with raw energy...';
            }
        }

        function fullPortal(boothNum) {
            document.body.style.filter = 'brightness(0.6)';
            setTimeout(()=>{ document.body.style.filter = ''; }, 2000);
            activateBooth(boothNum);
        }

        async function askOrb(orbNum) {
            const msgDiv = document.getElementById('orb-msg');
            const questions = {
                1: "You are Orb 1, the Encourager. React to a contestant entering Booth 3.",
                2: "You are Orb 2, the Cynic. React to a contestant entering Booth 7.",
                3: "You are Orb 3, the Watcher. What do you see that others don't?"
            };
            try {
                const res = await fetch(`${BASE}/studio/lore`, {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({question: questions[orbNum]})
                });
                const data = await res.json();
                msgDiv.textContent = data.response || '...';
            } catch(e) {
                msgDiv.textContent = 'The Orb remains silent...';
            }
        }

        // Nova Chat
        function toggleChat() {
            document.getElementById('chat-panel').classList.toggle('open');
        }
        async function sendChat() {
            const input = document.getElementById('chat-input');
            const msg = input.value.trim();
            if (!msg) return;
            const chatDiv = document.getElementById('chat-messages');
            chatDiv.innerHTML += `<div style="color:#F59E0B">You: ${msg}</div>`;
            input.value = '';
            try {
                const res = await fetch(`${BASE}/ai/chat`, {
                    method:'POST', headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({prompt: msg})
                });
                const data = await res.json();
                chatDiv.innerHTML += `<div style="color:#00F0FF">Nova: ${data.response || data}</div>`;
                // TTS
                const audio = new Audio(`https://koola10-tts.fly.dev/tts?text=${encodeURIComponent(data.response||data)}&voice=nova`);
                audio.play();
            } catch(e) {
                chatDiv.innerHTML += `<div style="color:red">Nova: Connection lost.</div>`;
            }
            chatDiv.scrollTop = chatDiv.scrollHeight;
        }

        // Random Orb3 appearance
        if (Math.random() < 0.3) {
            document.getElementById('orb3').style.display = 'block';
        }

        // Real-time Events
        const es = new EventSource(`${BASE}/events/stream`);
        es.addEventListener('trade_win', (e) => {
            const data = JSON.parse(e.data).data;
            const ticker = document.getElementById('ticker');
            ticker.textContent = `💰 WIN: ${data.message}`;
            document.getElementById('booth3').style.boxShadow = '0 0 50px #00F0FF';
            setTimeout(() => document.getElementById('booth3').style.boxShadow = '', 5000);
            if (data.tts) new Audio(`https://koola10-tts.fly.dev/tts?text=${encodeURIComponent(data.tts)}&voice=nova`).play();
        });
        es.addEventListener('grant_submitted', (e) => {
            const data = JSON.parse(e.data).data;
            const ticker = document.getElementById('ticker');
            ticker.textContent = `🚀 GRANT: ${data.message}`;
            document.getElementById('orb-msg').textContent = "Orb 1: Excellent work, contestant!";
            document.getElementById('orb-msg').style.color = "#F59E0B";
            if (data.tts) new Audio(`https://koola10-tts.fly.dev/tts?text=${encodeURIComponent(data.tts)}&voice=nova`).play();
        });
        es.addEventListener('new_lead', (e) => {
            const data = JSON.parse(e.data).data;
            const ticker = document.getElementById('ticker');
            ticker.textContent = `📬 LEAD: ${data.message}`;
            document.getElementById('orb3').style.display = 'block';
            setTimeout(() => document.getElementById('orb3').style.display = 'none', 10000);
            if (data.tts) new Audio(`https://koola10-tts.fly.dev/tts?text=${encodeURIComponent(data.tts)}&voice=nova`).play();
        });
        es.addEventListener('morning_brief', (e) => {
            const data = JSON.parse(e.data).data;
            alert("Good Morning, Boss! Nova has a briefing for you.");
            if (data.tts) new Audio(`https://koola10-tts.fly.dev/tts?text=${encodeURIComponent(data.tts)}&voice=nova`).play();
        });
        es.addEventListener('idle_chat', (e) => {
            const data = JSON.parse(e.data).data;
            const chatDiv = document.getElementById('chat-messages');
            chatDiv.innerHTML += `<div style="color:#00F0FF">Nova: ${data.message}</div>`;
            chatDiv.scrollTop = chatDiv.scrollHeight;
            if (data.tts) new Audio(`https://koola10-tts.fly.dev/tts?text=${encodeURIComponent(data.tts)}&voice=nova`).play();
        });
    </script>
</body>
</html>
