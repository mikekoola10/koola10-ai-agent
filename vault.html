<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koola Vault – Live</title>
    <style>
        body { background: #0a0a0a; color: #0f0; font-family: monospace; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        input, select, button { background: #1e1e1e; border: 1px solid #0f0; color: #0f0; padding: 8px; margin: 5px; border-radius: 8px; }
        button { background: #0f0; color: #000; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #2a2a2a; padding: 8px; text-align: left; }
        .income { color: #0f0; } .expense { color: #f55; } .trade { color: #ff0; } .profit { color: #0ff; }
    </style>
</head>
<body>
<div class="container">
    <h1>🌀 Koola Vault · Google Sheets Backend</h1>
    <div id="message"></div>

    <!-- Subscription Health Widget -->
    <div id="healthSection" style="background: #0a0a0a; border: 1px solid #0f0; border-radius: 12px; padding: 15px; margin-bottom: 20px;">
        <h2>💳 Subscription Health</h2>
        <div id="healthContent">Loading health data...</div>
    </div>

    <div id="forecastSection" style="background: #0a0a0a; border: 1px solid #0ff; border-radius: 12px; padding: 15px; margin-bottom: 20px;">
        <h3>📈 30-Day Ops Fund Forecast</h3>
        <div id="forecastContent">Loading forecast...</div>
    </div>
    <div>
        <input type="text" id="desc" placeholder="Description (e.g., BTC trade)">
        <input type="number" id="amount" placeholder="Amount (USD)">
        <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
            <option value="trade">Trade</option>
            <option value="profit">Profit Sweep</option>
        </select>
        <input type="text" id="notes" placeholder="Notes (optional)">
        <button id="addBtn">Add Entry</button>
    </div>
    <table id="txTable">
        <thead><tr><th>Timestamp</th><th>Description</th><th>Amount</th><th>Type</th><th>Notes</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxFFviECwZcWEZy9HLo2aEUlAqB-brL5MZFcn1OtTe8wYurw4G7AJltd5dHAE6bQRRg/exec';

    async function showMessage(text, isError = true) {
        const msgDiv = document.getElementById('message');
        msgDiv.innerHTML = `<div style="background:${isError ? '#311' : '#131'}; border-left:4px solid ${isError ? '#f55' : '#0f0'}; padding:10px; margin:10px 0;">${text}</div>`;
        setTimeout(() => msgDiv.innerHTML = '', 4000);
    }

    async function loadTransactions() {
        try {
            const res = await fetch(`${API_URL}?action=get`);
            const data = await res.json();
            const tbody = document.querySelector('#txTable tbody');
            tbody.innerHTML = '';
            data.reverse().forEach(tx => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = new Date(tx.timestamp).toLocaleString();
                row.insertCell(1).innerText = tx.description;
                row.insertCell(2).innerText = `$${parseFloat(tx.amount).toFixed(2)}`;
                row.insertCell(3).innerHTML = `<span class="${tx.type}">${tx.type}</span>`;
                row.insertCell(4).innerText = tx.notes || '';
            });
        } catch (err) {
            showMessage('Load error: ' + err.message);
        }
    }

    async function addTransaction() {
        const description = document.getElementById('desc').value.trim();
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;
        const notes = document.getElementById('notes').value.trim();
        if (!description || !amount) return showMessage('Description and amount required');
        const params = new URLSearchParams();
        params.append('action', 'add');
        params.append('description', description);
        params.append('amount', amount);
        params.append('type', type);
        params.append('notes', notes);
        try {
            const res = await fetch(`${API_URL}?${params.toString()}`);
            const result = await res.json();
            if (result.status === 'ok') {
                showMessage('Entry added', false);
                document.getElementById('desc').value = '';
                document.getElementById('amount').value = '';
                document.getElementById('notes').value = '';
                loadTransactions();
            } else {
                showMessage('Error: ' + JSON.stringify(result));
            }
        } catch (err) {
            showMessage('Add error: ' + err.message);
        }
    }

    async function loadSubscriptionHealth() {
        const container = document.getElementById('healthContent');
        try {
            const res = await fetch('/api/subscription-health');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();

            let html = '';

            // Upcoming bills
            html += `<div style="margin-bottom: 15px;"><strong>📅 Upcoming (next 7 days)</strong><ul>`;
            if (data.upcoming.length === 0) html += '<li>None</li>';
            for (const b of data.upcoming) {
                const due = new Date(b.due_date).toLocaleDateString();
                html += `<li>${b.vendor} – $${b.amount.toFixed(2)} (due ${due})</li>`;
            }
            html += `</ul></div>`;

            // Failed payments
            html += `<div style="margin-bottom: 15px;"><strong>⚠️ Failed / Overdue</strong><ul>`;
            if (data.failed.length === 0) html += '<li>None</li>';
            for (const b of data.failed) {
                html += `<li style="color:#f55;">${b.vendor} – $${b.amount.toFixed(2)} (overdue)</li>`;
            }
            html += `</ul></div>`;

            // Total monthly recurring
            html += `<div><strong>💰 Total Monthly Recurring:</strong> $${data.total_monthly.toFixed(2)}</div>`;

            // Cards info
            html += `<div><strong>💳 Active Virtual Cards:</strong> ${data.cards.length} active</div>`;

            container.innerHTML = html;
        } catch (err) {
            container.innerHTML = `<span style="color:#f55;">Error loading health: ${err.message}</span>`;
        }
    }

    async function loadForecast() {
        const container = document.getElementById('forecastContent');
        try {
            const res = await fetch('/api/forecast');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();

            let html = '<ul>';
            for (let i = 0; i < data.length; i += 7) { // weekly
                const date = new Date(data[i].date).toLocaleDateString();
                html += `<li>${date}: <strong>$${data[i].balance.toFixed(2)}</strong></li>`;
            }
            // Add final day
            if (data.length > 0 && (data.length - 1) % 7 !== 0) {
                const last = data[data.length - 1];
                html += `<li>${new Date(last.date).toLocaleDateString()}: <strong>$${last.balance.toFixed(2)}</strong></li>`;
            }
            html += '</ul>';
            container.innerHTML = html;
        } catch (err) {
            container.innerHTML = `<span style="color:#f55;">Error loading forecast: ${err.message}</span>`;
        }
    }

    document.getElementById('addBtn').onclick = addTransaction;
    loadTransactions();
    loadSubscriptionHealth();
    loadForecast();
    setInterval(() => {
        loadSubscriptionHealth();
        loadForecast();
    }, 60 * 1000);
</script>
</body>
</html>
