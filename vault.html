<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koola10 Vault — Financial Command</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0820;
            font-family: system-ui, sans-serif;
            color: #fff;
            min-height: 100vh;
        }
        .vault-bg {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse at 30% 50%, rgba(245,158,11,0.05) 0%, transparent 70%),
                        radial-gradient(ellipse at 70% 50%, rgba(245,158,11,0.03) 0%, transparent 70%),
                        linear-gradient(180deg, #0b0820 0%, #1E1B4B 50%, #0b0820 100%);
        }
        .container {
            position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 30px 20px 100px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 5px; text-shadow: 0 0 30px rgba(245,158,11,0.6); letter-spacing: 2px; }
        .subtitle { color: #aaa; margin-bottom: 30px; }
        .card {
            background: rgba(15,12,35,0.7); border-radius: 16px; padding: 20px;
            margin-bottom: 20px; backdrop-filter: blur(10px); border: 1px solid #333;
        }
        .card h2 { color: #F59E0B; margin-bottom: 15px; }
        .balance-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; }
        .balance-item {
            flex: 1; min-width: 120px; background: rgba(0,0,0,0.3); border-radius: 12px;
            padding: 15px; text-align: center; border: 1px solid #333;
        }
        .balance-item .ecosystem { font-size: 0.8rem; color: #aaa; text-transform: uppercase; }
        .balance-item .amount { font-size: 1.4rem; font-weight: bold; color: #F59E0B; margin-top: 5px; }
        .total-card { background: rgba(245,158,11,0.1); border-color: #F59E0B; }
        .total-card .amount { font-size: 2rem; }
        .input-row { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .input-row input {
            flex: 1; min-width: 150px; background: rgba(255,255,255,0.05); border: 1px solid #444;
            color: #fff; padding: 10px; border-radius: 8px; outline: none;
        }
        .input-row input::placeholder { color: #666; }
        .btn {
            padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none;
            font-weight: bold; transition: all 0.3s;
        }
        .btn-primary { background: #F59E0B; color: #000; }
        .btn-primary:hover { background: #d97706; }
        .btn-danger { background: #EF4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-outline { background: transparent; border: 1px solid #F59E0B; color: #F59E0B; }
        .btn-outline:hover { background: rgba(245,158,11,0.1); }
        .quick-actions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .approval-card {
            background: rgba(245,158,11,0.08); border: 1px solid #F59E0B;
            border-radius: 12px; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { box-shadow: 0 0 10px rgba(245,158,11,0.2); } 50% { box-shadow: 0 0 25px rgba(245,158,11,0.5); } }
        .approval-info { flex: 1; }
        .approval-info .amount { font-size: 1.3rem; font-weight: bold; color: #F59E0B; }
        .approval-info .detail { font-size: 0.85rem; color: #aaa; }
        .approval-actions { display: flex; gap: 10px; }
        .history-item {
            border-bottom: 1px solid #222; padding: 10px 0; font-size: 0.9rem;
            display: flex; justify-content: space-between; flex-wrap: wrap;
        }
        .history-item .status { font-weight: bold; }
        .status-approved { color: #10B981; }
        .status-rejected { color: #EF4444; }
        .status-auto { color: #F59E0B; }
        .status-pending { color: #3B82F6; }
        .empty-state { color: #666; text-align: center; padding: 20px; }
        .loading { text-align: center; color: #aaa; padding: 20px; }
    </style>
</head>
<body>
<div class="vault-bg"></div>
<div class="container">
    <h1>🏦 Koola10 Vault</h1>
    <p class="subtitle">Financial Command Center — All 7 Ecosystems</p>

    <!-- Balance Overview -->
    <div class="card">
        <h2>Empire Balance</h2>
        <div class="balance-row" id="balances"></div>
    </div>

    <!-- Move Money -->
    <div class="card">
        <h2>Move Money</h2>
        <div class="input-row">
            <input type="number" id="amount" placeholder="Amount (USD)" step="0.01" min="0.01">
            <input type="text" id="cashtag" placeholder="Recipient $cashtag" value="$Koola10">
            <button class="btn btn-primary" onclick="sendPayout()">Send</button>
        </div>
        <div id="send-status" style="margin-top:10px;"></div>
        <div class="quick-actions">
            <span style="color:#aaa;font-size:0.8rem;">Quick:</span>
            <button class="btn btn-outline" onclick="quickSend(5)">$5 Test</button>
            <button class="btn btn-outline" onclick="quickSend(110)">$110 PS Plus</button>
            <button class="btn btn-outline" onclick="quickSend(200)">$200 ChatGPT Pro</button>
            <button class="btn btn-outline" onclick="quickSend(20)">$20 Claude</button>
            <button class="btn btn-outline" onclick="quickSend(99)">$99 Abacus</button>
        </div>
    </div>

    <!-- Authorization Console -->
    <div class="card">
        <h2>🔐 Authorization Console</h2>
        <div id="approvals-list"></div>
        <div id="approvals-empty" class="empty-state">No pending approvals.</div>
    </div>

    <!-- Achievements Panel -->
    <div class="card">
        <h2>🏆 Achievements & Challenges</h2>
        <div id="badges-list" style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:15px;"></div>
        <div id="challenges-list"></div>
    </div>

    <!-- Transaction History -->
    <div class="card">
        <h2>Transaction History</h2>
        <div id="history-list"></div>
        <div id="history-empty" class="empty-state">No transactions yet.</div>
    </div>
</div>

<script>
const BASE = window.location.origin === 'null' ? 'https://koola10.fly.dev' : window.location.origin;
const ECOSYSTEMS = [
    { name: 'Koola10', url: `${BASE}/financial/status` },
    { name: 'Oracle', url: 'https://chatgpt-oracle.fly.dev/financial/status' },
    { name: 'Sentinel', url: 'https://sentinel-koola10.fly.dev/financial/status' },
    { name: 'Nexus', url: 'https://nexus-koola10-agent.fly.dev/financial/status' },
    { name: 'Echelon', url: 'https://echelon-koola10.fly.dev/financial/status' },
    { name: 'Aegis', url: 'https://aegis-koola10.fly.dev/financial/status' },
    { name: 'Prism', url: 'https://prism-koola10.fly.dev/financial/status' }
];

// ===== BALANCE OVERVIEW =====
async function loadBalances() {
    const container = document.getElementById('balances');
    let total = 0;
    let html = '';
    for (const eco of ECOSYSTEMS) {
        try {
            const res = await fetch(eco.url);
            const data = await res.json();
            const balance = data.balance || 0;
            total += balance;
            html += `<div class="balance-item"><div class="ecosystem">${eco.name}</div><div class="amount">$${balance.toFixed(2)}</div></div>`;
        } catch(e) {
            html += `<div class="balance-item"><div class="ecosystem">${eco.name}</div><div class="amount" style="color:#EF4444;">Offline</div></div>`;
        }
    }
    html = `<div class="balance-item total-card"><div class="ecosystem">Total Empire</div><div class="amount">$${total.toFixed(2)}</div></div>` + html;
    container.innerHTML = html;
}

// ===== MOVE MONEY =====
async function sendPayout() {
    const amount = parseFloat(document.getElementById('amount').value);
    const cashtag = document.getElementById('cashtag').value.trim();
    if (!amount || amount <= 0) return alert('Please enter a valid amount.');
    if (!cashtag) return alert('Please enter a recipient $cashtag.');

    const statusDiv = document.getElementById('send-status');
    statusDiv.innerHTML = 'Sending…';
    try {
        const res = await fetch(`${BASE}/agent/send-to-cashapp`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ cashtag, amount })
        });
        const data = await res.json();
        if (data.approval_required) {
            statusDiv.innerHTML = '⏳ Awaiting approval… Check the Authorization Console.';
        } else {
            statusDiv.innerHTML = '✅ Payout completed! Check your Cash App.';
        }
    } catch(e) {
        statusDiv.innerHTML = '❌ Error sending payout. Check console.';
    }
    document.getElementById('amount').value = '';
    loadApprovals();
    loadHistory();
}

function quickSend(amount) {
    document.getElementById('amount').value = amount;
    sendPayout();
}

// ===== AUTHORIZATION CONSOLE =====
async function loadApprovals() {
    const container = document.getElementById('approvals-list');
    const empty = document.getElementById('approvals-empty');
    try {
        const res = await fetch(`${BASE}/agent/pending-approvals`);
        const data = await res.json();
        const approvals = data.approvals || data || [];
        if (!approvals.length) {
            container.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        container.innerHTML = approvals.map(a => `
            <div class="approval-card">
                <div class="approval-info">
                    <div class="amount">$${a.amount.toFixed(2)}</div>
                    <div class="detail">To: ${a.cashtag} | ${new Date(a.timestamp).toLocaleString()}</div>
                </div>
                <div class="approval-actions">
                    <button class="btn btn-primary" onclick="approve('${a.payout_id}')">APPROVE</button>
                    <button class="btn btn-danger" onclick="reject('${a.payout_id}')">Reject</button>
                </div>
            </div>
        `).join('');
    } catch(e) {
        container.innerHTML = '';
        empty.style.display = 'block';
    }
}

async function approve(id) {
    await fetch(`${BASE}/voice/confirm`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ approved: true, payout_id: id })
    });
    loadApprovals();
    loadHistory();
    loadBalances();
}

async function reject(id) {
    await fetch(`${BASE}/voice/confirm`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ approved: false, payout_id: id })
    });
    loadApprovals();
    loadHistory();
}

// ===== TRANSACTION HISTORY =====
async function loadHistory() {
    const container = document.getElementById('history-list');
    const empty = document.getElementById('history-empty');
    try {
        const res = await fetch(`${BASE}/compliance/audit`);
        const data = await res.json();
        const payouts = (data.events || data || []).filter(e => e.action && e.action.includes('cashapp_payout'));
        if (!payouts.length) {
            container.innerHTML = '';
            empty.style.display = 'block';
            return;
        }
        empty.style.display = 'none';
        container.innerHTML = payouts.reverse().slice(0, 30).map(p => {
            const statusClass = p.action.includes('approved') ? 'status-approved' :
                                p.action.includes('rejected') ? 'status-rejected' :
                                p.action.includes('auto') ? 'status-auto' : 'status-pending';
            const statusLabel = p.action.includes('approved') ? 'Approved' :
                                p.action.includes('rejected') ? 'Rejected' :
                                p.action.includes('auto') ? 'Auto' : 'Pending';

            let recipient = p.cashtag || '—';
            if (p.details && typeof p.details === 'object') {
                recipient = p.details.cashtag || p.details.recipient || JSON.stringify(p.details);
            } else if (p.details) {
                recipient = p.details;
            }

            return `<div class="history-item">
                <span>$${p.amount?.toFixed(2) || '—'} → ${recipient}</span>
                <span class="status ${statusClass}">${statusLabel}</span>
                <span style="color:#666;font-size:0.75rem;">${new Date(p.timestamp).toLocaleString()}</span>
            </div>`;
        }).join('');
    } catch(e) {
        container.innerHTML = '';
        empty.style.display = 'block';
    }
}

// ===== SSE FOR REAL-TIME APPROVALS =====
function connectSSE() {
    const es = new EventSource(`${BASE}/events/stream`);
    es.onmessage = (event) => {
        try {
            const data = JSON.parse(event.data);
            if (data.type === 'cashapp_payout_request') {
                loadApprovals();
            }
        } catch(e) {}
    };
    es.onerror = () => {
        setTimeout(connectSSE, 5000);
    };
}

// ===== ACHIEVEMENTS =====
async function loadAchievements() {
    try {
        const res = await fetch(`${BASE}/agent/gamification`);
        const data = await res.json();

        const badgesContainer = document.getElementById('badges-list');
        badgesContainer.innerHTML = Object.keys(data.badges || {}).map(b => `
            <div style="background:#F59E0B; color:#000; padding:5px 10px; border-radius:20px; font-size:0.8rem; font-weight:bold;">🏅 ${b}</div>
        `).join('') || '<div class="empty-state">No badges earned yet.</div>';

        const challengesContainer = document.getElementById('challenges-list');
        challengesContainer.innerHTML = Object.values(data.daily_challenges || {}).map(c => `
            <div class="history-item">
                <span>🎯 ${c.name} (${c.current}/${c.target})</span>
                <span class="status ${c.completed ? 'status-approved' : 'status-pending'}">${c.completed ? 'COMPLETED' : 'IN PROGRESS'}</span>
            </div>
        `).join('') || '<div class="empty-state">No challenges found today.</div>';
    } catch(e) {}
}

// ===== INIT =====
loadBalances();
loadApprovals();
loadHistory();
loadAchievements();
connectSSE();

setInterval(loadAchievements, 10000);

// Poll fallback every 15s
setInterval(loadApprovals, 15000);
setInterval(loadBalances, 60000);
setInterval(loadHistory, 30000);
</script>
</body>
</html>
