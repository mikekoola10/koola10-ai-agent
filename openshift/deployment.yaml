apiVersion: apps/v1
kind: Deployment
metadata:
  name: ask-agency-swarm
  labels:
    app: ask-agency
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ask-agency
  template:
    metadata:
      labels:
        app: ask-agency
    spec:
      containers:
      - name: agent
        image: image-registry.openshift-image-registry.svc:5000/ask-agency/agent:latest
        ports:
        - containerPort: 8080
        env:
        - name: PORT
          value: "8080"
        - name: RHEL_MODE
          value: "true"
        resources:
          requests:
            cpu: "500m"
            memory: "1Gi"
          limits:
            cpu: "2"
            memory: "4Gi"
