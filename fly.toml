# fly.toml app configuration file generated for koola10-stacking on 2026-05-23T10:08:16Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'koola10'
primary_region = 'ams'

[build]

[env]
  PORT = '8080'

[processes]
  app = './agent'

[[mounts]]
  source = 'metaclaw_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'get'
    path = '/'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
