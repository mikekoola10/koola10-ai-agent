app = 'koola10'
primary_region = 'ams'

[build]

[env]
  PORT = '8080'
  BROWSER_AGENT_URL = 'http://localhost:8081'
  PLAYWRIGHT_BROWSERS_PATH = '/ms-playwright'
  HOME = '/home/node'

[processes]
  app = './start.sh'

[[mounts]]
  source = 'metaclaw_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '10s'
    timeout = '2s'
    grace_period = '5s'
    method = 'get'
    path = '/health'

[[vm]]
  memory = '2gb'
  cpu_kind = 'shared'
  cpus = 1
