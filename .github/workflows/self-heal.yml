name: Self-Healing CI/CD

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  self-heal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Fetch logs
        run: flyctl logs --app koola10-agent --since 10m > fly-logs.txt
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Analyze logs
        id: analyze
        run: python3 .github/scripts/analyze_logs.py

      - name: Remediate
        run: python3 .github/scripts/remediate.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
