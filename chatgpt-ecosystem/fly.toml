app = "chatgpt-oracle"
primary_region = "ams"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[http_service.checks]]
  grace_period = "5s"
  interval = "10s"
  method = "get"
  timeout = "2s"
  path = "/"

[[mounts]]
  source = "metaclaw_data"
  destination = "/data"

[env]
  PORT = "8080"

[processes]
  app = "./agent"
