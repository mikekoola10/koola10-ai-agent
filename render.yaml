services:
  - type: web
    name: koola10
    runtime: docker
    repo: https://github.com/mikekoola10/koola10-ai-agent
    branch: main
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 8080
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: AGENTCARD_JWT
        sync: false
      - key: STELLAR_SECRET_KEY
        sync: false
      - key: STELLAR_PUBLIC_KEY
        sync: false
      - key: AGENTMAIL_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: ADMIN_API_KEY
        sync: false
