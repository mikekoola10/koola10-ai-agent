<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Studio — Autonomous Creative Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0820;
            font-family: system-ui, sans-serif;
            color: #fff;
            min-height: 100vh;
        }
        .nebula {
            position: fixed; inset: 0; pointer-events: none; z-index: 0;
            background: radial-gradient(ellipse at 30% 50%, rgba(0,240,255,0.06) 0%, transparent 70%),
                        radial-gradient(ellipse at 70% 50%, rgba(139,92,246,0.06) 0%, transparent 70%);
        }
        .container {
            position: relative; z-index: 1; max-width: 800px; margin: 0 auto; padding: 30px 20px 100px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 5px; text-shadow: 0 0 30px rgba(0,240,255,0.6); }
        .subtitle { color: #aaa; margin-bottom: 30px; }
        .panel {
            background: rgba(15,12,35,0.7); border-radius: 16px; padding: 20px;
            margin-bottom: 20px; backdrop-filter: blur(10px); border: 1px solid #333;
        }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab-btn {
            background: rgba(255,255,255,0.05); color: #ccc; border: 1px solid #444;
            padding: 8px 16px; border-radius: 8px; cursor: pointer;
        }
        .tab-btn.active { background: #F59E0B; color: #000; border-color: #F59E0B; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .chat-messages { max-height: 300px; overflow-y: auto; margin-bottom: 10px; }
        .chat-messages div { margin-bottom: 8px; }
        .input-row { display: flex; gap: 10px; }
        .input-row input {
            flex: 1; background: rgba(255,255,255,0.05); border: 1px solid #444;
            color: #fff; padding: 10px; border-radius: 8px; outline: none;
        }
        .input-row button {
            background: #F59E0B; color: #000; border: none; padding: 10px 18px;
            border-radius: 8px; cursor: pointer;
        }
        .mic-btn {
            background: #00F0FF; color: #000; border: none; border-radius: 50%;
            width: 40px; height: 40px; font-size: 1.2rem; cursor: pointer;
        }
        .goal-card {
            background: rgba(0,240,255,0.05); border: 1px solid #00F0FF22;
            border-radius: 8px; padding: 12px; margin-bottom: 10px;
        }
        .progress-bar {
            background: #222; border-radius: 4px; height: 8px; margin-top: 6px;
        }
        .progress-fill {
            background: #F59E0B; height: 8px; border-radius: 4px; transition: width 0.5s;
        }
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .gallery img, .gallery video { width: 100%; border-radius: 8px; cursor: pointer; }
        .self-awareness { color: #aaa; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>
<div class="nebula"></div>
<div class="container">
    <h1>🎨 Nova Studio</h1>
    <p class="subtitle">Autonomous Creative Agent — Voice‑First</p>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('chat')">💬 Chat</button>
        <button class="tab-btn" onclick="switchTab('generate')">🖼️ Generate</button>
        <button class="tab-btn" onclick="switchTab('goals')">🎯 Goals</button>
        <button class="tab-btn" onclick="switchTab('gallery')">🖼️ Gallery</button>
    </div>

    <!-- Chat Tab -->
    <div class="tab-content active" id="chat-tab">
        <div class="panel">
            <div class="chat-messages" id="chat-messages"></div>
            <div class="input-row">
                <input type="text" id="chat-input" placeholder="Talk to Nova..." onkeydown="if(event.key==='Enter')sendChat()">
                <button onclick="sendChat()">Send</button>
                <button class="mic-btn" onclick="startVoice()">🎤</button>
            </div>
        </div>
    </div>

    <!-- Generate Tab -->
    <div class="tab-content" id="generate-tab">
        <div class="panel">
            <h3>Generate Media</h3>
            <div class="input-row" style="margin-bottom:10px;">
                <input type="text" id="gen-prompt" placeholder="Describe what to create...">
            </div>
            <div style="display:flex; gap:10px;">
                <button onclick="generateMedia('image')">🖼️ Create Image</button>
                <button onclick="generateMedia('video')">🎬 Create Video</button>
            </div>
            <div id="gen-status" style="margin-top:10px;"></div>
        </div>
    </div>

    <!-- Goals Tab -->
    <div class="tab-content" id="goals-tab">
        <div class="panel">
            <h3>Nova's Goals</h3>
            <div class="input-row" style="margin-bottom:10px;">
                <input type="text" id="goal-input" placeholder="Add a new goal...">
                <button onclick="addGoal()">Add</button>
            </div>
            <div id="goals-list"></div>
        </div>
    </div>

    <!-- Gallery Tab -->
    <div class="tab-content" id="gallery-tab">
        <div class="panel">
            <h3>Gallery</h3>
            <div class="gallery" id="gallery"></div>
        </div>
    </div>

    <!-- Self-Awareness -->
    <div class="panel self-awareness" id="nova-state">
        Loading Nova's state...
    </div>
</div>

<script>
const BASE = 'https://koola10.fly.dev';
let galleryItems = [];

// Tab switching
function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(tab+'-tab').classList.add('active');
}

// Chat
async function sendChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim(); if (!msg) return;
    const chatDiv = document.getElementById('chat-messages');
    chatDiv.innerHTML += `<div style="color:#F59E0B">You: ${msg}</div>`;
    input.value = '';
    try {
        const res = await fetch(`${BASE}/nova`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({prompt:msg, mode:'chat'}) });
        const data = await res.json();
        const reply = data.response || data;
        chatDiv.innerHTML += `<div style="color:#00F0FF">Nova: ${reply}</div>`;
        try {
            const audio = new Audio(`https://koola10-tts.fly.dev/tts?text=${encodeURIComponent(reply)}&voice=nova`);
            audio.play();
        } catch(e) {}
    } catch(e) {
        chatDiv.innerHTML += `<div style="color:red">Nova: Connection lost.</div>`;
    }
    chatDiv.scrollTop = chatDiv.scrollHeight;
}

// Voice
function startVoice() {
    const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = 'en-US';
    recognition.onresult = (event) => {
        document.getElementById('chat-input').value = event.results[0][0].transcript;
        sendChat();
    };
    recognition.start();
}

// Generate Media
async function generateMedia(type) {
    const prompt = document.getElementById('gen-prompt').value.trim();
    if (!prompt) return;
    document.getElementById('gen-status').innerHTML = 'Generating...';
    try {
        const res = await fetch(`${BASE}/nova`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({prompt, mode:'generate', type}) });
        const data = await res.json();
        const url = data.url || data.media_url;
        if (url) {
            galleryItems.push({type, url, prompt});
            renderGallery();
            document.getElementById('gen-status').innerHTML = 'Done! Check the Gallery tab.';
        } else {
            document.getElementById('gen-status').innerHTML = 'Generation failed.';
        }
    } catch(e) {
        document.getElementById('gen-status').innerHTML = 'Error generating.';
    }
}

function renderGallery() {
    const galleryDiv = document.getElementById('gallery');
    galleryDiv.innerHTML = galleryItems.map(item =>
        item.type==='image' ? `<img src="${item.url}" alt="${item.prompt}" onclick="window.open('${item.url}')">`
        : `<video src="${item.url}" controls></video>`
    ).join('');
}

// Goals
async function addGoal() {
    const input = document.getElementById('goal-input');
    const desc = input.value.trim(); if (!desc) return;
    input.value = '';
    await fetch(`${BASE}/nova`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({mode:'goal', action:'add', description:desc}) });
    loadGoals();
}

async function loadGoals() {
    try {
        const res = await fetch(`${BASE}/nova`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({mode:'goal', action:'list'}) });
        const data = await res.json();
        const list = document.getElementById('goals-list');
        if (data.goals && data.goals.length) {
            list.innerHTML = data.goals.map(g => `<div class="goal-card"><strong>${g.description}</strong><br>Progress: ${g.progress}%<div class="progress-bar"><div class="progress-fill" style="width:${g.progress}%"></div></div></div>`).join('');
        } else {
            list.innerHTML = 'No goals yet.';
        }
    } catch(e) {}
}

// Self-awareness
async function loadState() {
    try {
        const res = await fetch(`${BASE}/nova`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({mode:'state'}) });
        const data = await res.json();
        document.getElementById('nova-state').innerHTML = `🧠 ${data.message || 'Nova is thinking...'}`;
    } catch(e) {}
}

// Init
loadGoals();
loadState();
setInterval(() => { loadGoals(); loadState(); }, 30000);
</script>
</body>
</html>
